<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <!-- Extremely soft radial gradient for the molten glow bleeding out -->
    <radialGradient id="molten-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stopColor="#f7931a" stopOpacity="0.8" />
      <stop offset="60%" stopColor="#ffb347" stopOpacity="0.2" />
      <stop offset="100%" stopColor="#ffb347" stopOpacity="0" />
    </radialGradient>
    
    <!-- White hot inner core for the logo itself -->
    <linearGradient id="hot-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#ffffff" />
      <stop offset="20%" stopColor="#ffea80" />
      <stop offset="60%" stopColor="#f7931a" />
      <stop offset="100%" stopColor="#d15a00" />
    </linearGradient>

    <!-- Gaussian blur for the logo bloom inside the chamber -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer metallic base plate (identical to unlit) -->
  <rect x="10" y="10" width="100" height="100" rx="20" fill="#080a0e" stroke="#1c202a" strokeWidth="2" />
  
  <!-- 4 Corner Rivets -->
  <circle cx="22" cy="22" r="3" fill="#040508" stroke="#1c202a" strokeWidth="1" />
  <circle cx="98" cy="22" r="3" fill="#040508" stroke="#1c202a" strokeWidth="1" />
  <circle cx="22" cy="98" r="3" fill="#040508" stroke="#1c202a" strokeWidth="1" />
  <circle cx="98" cy="98" r="3" fill="#040508" stroke="#1c202a" strokeWidth="1" />

  <!-- Inner chamber indentation, filled with a soft molten aura base -->
  <rect x="24" y="24" width="72" height="72" rx="14" fill="url(#molten-aura)" />

  <!-- The Active (Lit) BTC Logo — mathematically placed perfectly -->
  <g fill="url(#hot-core)" filter="url(#bloom)" transform="translate(13.27, 12.88) scale(1.5)">
    <path d="M46.103,27.444c0.637-4.258-2.605-6.547-7.038-8.074l1.438-5.768-3.511-0.875-1.4,5.616c-0.923-0.23-1.871-0.447-2.813-0.662l1.41-5.653-3.509-0.875-1.439,5.766c-0.764-0.174-1.514-0.346-2.242-0.527l0.004-0.018-4.842-1.209-0.934,3.75s2.605,0.597,2.55,0.634c1.422,0.355,1.679,1.296,1.636,2.042l-1.638,6.571c0.098,0.025,0.225,0.061,0.365,0.117-0.117-0.029-0.242-0.061-0.371-0.092l-2.296,9.205c-0.174,0.432-0.615,1.08-1.609,0.834,0.035,0.051-2.552-0.637-2.552-0.637l-1.743,4.019,4.569,1.139c0.85,0.213,1.683,0.436,2.503,0.646l-1.453,5.834,3.507,0.875,1.439-5.772c0.958,0.26,1.888,0.5,2.798,0.726l-1.434,5.745,3.511,0.875,1.453-5.823c5.987,1.133,10.489,0.676,12.384-4.739,1.527-4.36-0.076-6.875-3.226-8.515,2.294-0.529,4.022-2.038,4.483-5.155zm-8.022,11.249c-1.085,4.36-8.426,2.003-10.806,1.412l1.928-7.729c2.38,0.594,10.012,1.77,8.878,6.317zm1.086-11.312c-0.99,3.966-7.1,1.951-9.082,1.457l1.748-7.01c1.982,0.494,8.365,1.416,7.334,5.553z" />
  </g>
</svg>
